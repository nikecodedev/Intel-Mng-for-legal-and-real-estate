name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Run tests with coverage
        working-directory: apps/api
        run: npm run test:coverage
        env:
          NODE_ENV: test

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 164.92.71.218 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@164.92.71.218 bash << 'ENDSSH'
            set -e
            echo "=== Pulling latest code ==="
            cd /var/gems
            git pull origin main

            echo "=== Running all pending migrations ==="
            cd /var/gems/apps/api
            export $(grep -v '^#' .env | xargs) 2>/dev/null || true

            for migration_file in $(ls database/migrations/*.sql | sort -V); do
              echo "Applying $migration_file..."
              psql "$DATABASE_URL" -f "$migration_file" \
                && echo "  OK: $migration_file" \
                || echo "  SKIP (already applied or no-op): $migration_file"
            done

            echo "=== Building API ==="
            npm ci --prefer-offline 2>/dev/null || npm install
            npm run build

            echo "=== Restarting API ==="
            pm2 restart api || pm2 start dist/index.js --name api

            echo "=== Building & deploying GEMS frontend ==="
            cd /var/gems/apps/gems
            npm ci --prefer-offline 2>/dev/null || npm install
            npm run build
            pm2 restart gems || pm2 start node_modules/.bin/next --name gems -- start -p 3001

            echo "=== Building & deploying investor portal ==="
            cd /var/gems/apps/web
            npm ci --prefer-offline 2>/dev/null || npm install
            npm run build
            pm2 restart web || pm2 start node_modules/.bin/next --name web -- start -p 3002

            pm2 save
            echo "=== Deploy complete ==="
          ENDSSH
